<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f4f4; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); text-align: center; }
        input { padding: 10px; margin: 10px 0; width: 80%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Enter Password for Access</h2>
    <input type="password" id="passwordInput" placeholder="Password">
    <br>
    <button onclick="validatePassword()">Submit</button>
    <div id="errorMsg" class="error">Incorrect password. Please try again.</div>
</div>

<script>
async function validatePassword() {
    const targetHash = "33075655a691741a85b63641b8695a676974373bd502961989e05df8168ca9aa";
    const userInput = document.getElementById("passwordInput").value;
    const errorMsg = document.getElementById("errorMsg");
    
    // Encode user input text into bytes
    const encoder = new TextEncoder();
    const data = encoder.encode(userInput);
    
    // Hash the bytes using SHA-256
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    
    // Convert hash back into a hex string
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    const userHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

    if (userHash === targetHash) {
        // Set the session flag so auth-guard.js lets them pass
        sessionStorage.setItem("site_authenticated", "true");
        // Redirect to your main index file
        window.location.href = "index-2.html";
    } else {
        errorMsg.style.display = "block";
    }
}

// Allow pressing "Enter" key to submit
document.getElementById("passwordInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        validatePassword();
    }
});
</script>

</body>
</html>
